<!DOCTYPE html>
<html>
<head>
    <title>Financeiro</title>
    <link rel="icon" href="/static/img/icone.png">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/pix.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<h2>Hotelzinho Kids</h2>

<p onclick="window.location.href='/dashboard-page'">Dashboard</p>
<p onclick="window.location.href='/cadastro-criancas'">Cadastro Crianças</p>
<p onclick="window.location.href='/criancas-page'">Presença</p>
<p onclick="window.location.href='/financeiro-page'">Financeiro</p>
<p onclick="logout()">Sair</p>
<div class="sidebar-config" onclick="window.location.href='/configuracoes-page'">
<i class="fa-solid fa-gear"></i>
<span>Configurações</span>
</div>
</div>

</div>

<div class="layout">

    <div class="content">

        <h1>Cobranças</h1>

        <table id="tabelaCobrancas" class="tabela-financeiro">
            <thead>
                <tr>
                    <th>Criança</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Data Pagamento</th>
                    <th>Vencimento</th> 
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

<div id="modalHistorico" class="modal">
    <div class="modal-mod">

        <div class="header-historico">
            <div class="avatar"></div>
            <h2 id="tituloHistorico">Histórico</h2>
            <span class="fechar" onclick="fecharHistorico()">✕</span>
        </div>

        <div id="conteudoHistorico" class="conteudo-historico"></div>

        <button class="btn-fechar" onclick="fecharHistorico()">Fechar</button>

    </div>
</div>

    <div class="pix-container">

        <div class="pix-title">Pagamento via PIX</div>

        <div class="pix-valor" id="valor"></div>

        <div class="pix-qr">
            <img id="qrCode">
        </div>

        <textarea id="pixCode" class="pix-code" readonly></textarea>

        <button class="pix-btn" onclick="copiarPix()">Copiar código</button>

        <button class="pix-btn" onclick="abrirWhats()">Enviar no WhatsApp</button>

    </div>

</div>

<canvas id="graficoFinanceiro"></canvas>


<script src="/static/js/financeiro.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
